name: Release

on:
  push:
    tags:
      - 'v*'

env:
  TEST_LOG_DIR: output/test-logs

jobs:
  build-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            build_flags: ""
          - variant: docker
            build_flags: "--with-docker"
          - variant: alpine
            build_flags: "--base alpine"
          - variant: alpine-docker
            build_flags: "--base alpine --with-docker"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve validation metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${GITHUB_REF_NAME}"
          resolved_version="$(awk -F'"' '/^LANDSCAPE_VERSION=/{print $2; exit}' build.env)"
          artifact_id="${{ matrix.variant }}-${resolved_version}-${GITHUB_SHA::12}-${GITHUB_RUN_ID}"
          {
            echo "release_tag=$release_tag"
            echo "resolved_version=$resolved_version"
            echo "artifact_id=$artifact_id"
            echo "image_artifact=landscape-mini-x86-${artifact_id}"
            echo "log_artifact=test-logs-${artifact_id}"
          } >> "$GITHUB_OUTPUT"

      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap parted dosfstools e2fsprogs \
            grub-efi-amd64-bin grub-pc-bin qemu-utils rsync curl \
            sshpass socat jq qemu-system-x86 ovmf gzip

      - name: Build image (${{ matrix.variant }})
        env:
          RESOLVED_VERSION: ${{ steps.meta.outputs.resolved_version }}
        shell: bash
        run: |
          set -euo pipefail
          sudo APT_MIRROR="" ALPINE_MIRROR="" OUTPUT_FORMAT=img COMPRESS_OUTPUT=no \
            ./build.sh --version "${RESOLVED_VERSION}" ${{ matrix.build_flags }}

      - name: Fix output permissions
        run: sudo chown -R "$(id -u):$(id -g)" output/ work/

      - name: Capture artifact metadata
        env:
          RESOLVED_VERSION: ${{ steps.meta.outputs.resolved_version }}
          ARTIFACT_ID: ${{ steps.meta.outputs.artifact_id }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output/metadata "${TEST_LOG_DIR}"
          image_file="$(ls output/*.img)"
          image_base="$(basename "$image_file")"
          printf '%s\n' \
            "variant=${{ matrix.variant }}" \
            "release_tag=${{ steps.meta.outputs.release_tag }}" \
            "resolved_version=${RESOLVED_VERSION}" \
            "artifact_id=${ARTIFACT_ID}" \
            "git_sha=${GITHUB_SHA}" \
            "run_id=${GITHUB_RUN_ID}" \
            "workflow=${GITHUB_WORKFLOW}" \
            "image_file=${image_base}" \
            > output/metadata/build-metadata.txt
          cp output/metadata/build-metadata.txt "${TEST_LOG_DIR}/build-metadata.txt"

      - name: List outputs
        run: ls -lh output/

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.image_artifact }}
          path: |
            output/*.img
            output/metadata/build-metadata.txt
          retention-days: 5

      - name: Run readiness checks (${{ matrix.variant }})
        env:
          LANDSCAPE_TEST_VARIANT: ${{ matrix.variant }}
          LANDSCAPE_TEST_ARTIFACT_ID: ${{ steps.meta.outputs.artifact_id }}
          LANDSCAPE_TEST_LANDSCAPE_VERSION: ${{ steps.meta.outputs.resolved_version }}
        run: timeout --foreground 20m ./tests/test-readiness.sh output/*.img

      - name: Run dataplane tests (${{ matrix.variant }})
        env:
          LANDSCAPE_TEST_VARIANT: ${{ matrix.variant }}
          LANDSCAPE_TEST_ARTIFACT_ID: ${{ steps.meta.outputs.artifact_id }}
          LANDSCAPE_TEST_LANDSCAPE_VERSION: ${{ steps.meta.outputs.resolved_version }}
        run: timeout --foreground 25m ./tests/test-dataplane.sh output/*.img

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.log_artifact }}
          path: output/test-logs/
          retention-days: 7

  release:
    needs: build-and-validate
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          pattern: landscape-mini-x86-*
          path: artifacts/

      - name: Download validation logs
        uses: actions/download-artifact@v4
        with:
          pattern: test-logs-*
          path: release-logs/

      - name: Compress images
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in artifacts/*/*.img; do
            gzip -k "$f"
          done
          find artifacts -maxdepth 2 -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.img.gz
            artifacts/**/*.txt
          generate_release_notes: true
