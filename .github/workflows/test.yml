name: Test Image

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Build workflow run ID (leave empty for latest CI run on main)"
        default: ""
      artifact_suffix:
        description: "Artifact suffix: <variant>-<version>-<sha12>-<runid> (leave empty to auto-resolve latest)"
        default: ""
      landscape_version:
        description: "Expected Landscape version for metadata (optional)"
        default: ""

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
          - variant: docker
          - variant: alpine
          - variant: alpine-docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass socat curl jq qemu-system-x86 ovmf unzip

      - name: Resolve artifact names
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          suffix="${{ github.event.inputs.artifact_suffix }}"
          run_id="${{ github.event.inputs.run_id }}"
          if [ -n "$suffix" ]; then
            artifact_id="$suffix"
            if [ -z "$run_id" ]; then
              run_id="${suffix##*-}"
            fi
          else
            if [ -z "$run_id" ]; then
              run_id="$(gh run list --workflow ci.yml --branch main --limit 1 --json databaseId --jq '.[0].databaseId')"
            fi
            artifact_name="$(gh api \
              repos/${{ github.repository }}/actions/runs/${run_id}/artifacts \
              --jq '.artifacts[] | select(.name | startswith("landscape-mini-x86-${{ matrix.variant }}-")) | .name' | head -n 1)"
            if [ -z "$artifact_name" ]; then
              echo "Unable to resolve artifact for variant ${{ matrix.variant }} from run ${run_id}" >&2
              exit 1
            fi
            artifact_id="${artifact_name#landscape-mini-x86-}"
          fi
          {
            echo "resolved_run_id=$run_id"
            echo "artifact_id=$artifact_id"
            echo "image_artifact=landscape-mini-x86-$artifact_id"
            echo "log_artifact=test-logs-$artifact_id"
          } >> "$GITHUB_OUTPUT"

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.meta.outputs.image_artifact }}
          path: output/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.meta.outputs.resolved_run_id }}

      - name: Restore build metadata into test logs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output/test-logs
          resolved_version="${{ github.event.inputs.landscape_version }}"
          metadata_path="output/metadata/build-metadata.txt"
          if [ -f "$metadata_path" ]; then
            cp "$metadata_path" output/test-logs/build-metadata.txt
            if [ -z "$resolved_version" ]; then
              resolved_version="$(awk -F'=' '/^resolved_version=/{print $2; exit}' "$metadata_path")"
            fi
          fi
          if [ -z "$resolved_version" ]; then
            resolved_version="$(awk -F'"' '/^LANDSCAPE_VERSION=/{print $2; exit}' build.env)"
          fi
          echo "test_landscape_version=$resolved_version" >> "$GITHUB_ENV"

      - name: List outputs
        run: ls -lh output/

      - name: Run readiness checks (${{ matrix.variant }})
        env:
          LANDSCAPE_TEST_VARIANT: ${{ matrix.variant }}
          LANDSCAPE_TEST_ARTIFACT_ID: ${{ steps.meta.outputs.artifact_id }}
          LANDSCAPE_TEST_LANDSCAPE_VERSION: ${{ env.test_landscape_version }}
        run: timeout --foreground 20m ./tests/test-readiness.sh output/*.img

      - name: Run dataplane tests (${{ matrix.variant }})
        env:
          LANDSCAPE_TEST_VARIANT: ${{ matrix.variant }}
          LANDSCAPE_TEST_ARTIFACT_ID: ${{ steps.meta.outputs.artifact_id }}
          LANDSCAPE_TEST_LANDSCAPE_VERSION: ${{ env.test_landscape_version }}
        run: timeout --foreground 25m ./tests/test-dataplane.sh output/*.img

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-retest-${{ steps.meta.outputs.artifact_id }}
          path: output/test-logs/
          retention-days: 7
